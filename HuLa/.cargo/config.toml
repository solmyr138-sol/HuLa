## 配置cargo的国内源 (依赖很多所以还是需要慢慢等待，不至于卡死下载不了)
[source.crates-io]
replace-with = 'rsproxy-sparse'
[source.rsproxy]
registry = "https://rsproxy.cn/crates.io-index"
[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"
[registries.rsproxy]
index = "https://rsproxy.cn/crates.io-index"
[net]
git-fetch-with-cli = true

# Android cross-compile on Windows: avoid OOM (error 1455)
[build]
jobs = 2

[env]
CFLAGS_aarch64_apple_darwin = "-fno-modules"
CFLAGS_x86_64_apple_darwin = "-fno-modules"

# Android NDK 链接配置
# Static libc++: Java preload of libc++_shared does not satisfy undefined C++ symbols
# on modern Android (linker namespaces). Embed libc++ into libhula_app_lib.so.
[target.aarch64-linux-android]
linker = "aarch64-linux-android26-clang"
rustflags = [
    "-C",
    "link-arg=-lc++_static",
    "-C",
    "link-arg=-lc++abi",
    "-C",
    "link-arg=-lunwind",
    "-C",
    "link-arg=-llog",
    "-C",
    "link-arg=-landroid",
]

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi26-clang"
rustflags = [
    "-C",
    "link-arg=-lc++_static",
    "-C",
    "link-arg=-lc++abi",
    "-C",
    "link-arg=-lunwind",
    "-C",
    "link-arg=-llog",
    "-C",
    "link-arg=-landroid",
]

[target.i686-linux-android]
linker = "i686-linux-android26-clang"
rustflags = [
    "-C",
    "link-arg=-lc++_static",
    "-C",
    "link-arg=-lc++abi",
    "-C",
    "link-arg=-lunwind",
    "-C",
    "link-arg=-llog",
    "-C",
    "link-arg=-landroid",
]

[target.x86_64-linux-android]
linker = "x86_64-linux-android26-clang"
rustflags = [
    "-C",
    "link-arg=-lc++_static",
    "-C",
    "link-arg=-lc++abi",
    "-C",
    "link-arg=-lunwind",
    "-C",
    "link-arg=-llog",
    "-C",
    "link-arg=-landroid",
]

# Windows OpenSSL 编译需要原生 Windows Perl (Strawberry Perl)
# winget 安装的默认路径，避免与 MSYS2/Cygwin 的 perl 冲突
[target.x86_64-pc-windows-msvc.env]
PERL = "C:/Strawberry/perl/bin/perl.exe"

[target.i686-pc-windows-msvc.env]
PERL = "C:/Strawberry/perl/bin/perl.exe"

[target.aarch64-pc-windows-msvc.env]
PERL = "C:/Strawberry/perl/bin/perl.exe"
